spring:
  application:
    name: signal-collector
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/signallink}
    username: ${DB_USER:signallink}
    password: ${DB_PASSWORD:signallink}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

signallink:
  llm:
    daily-limit: ${LLM_DAILY_LIMIT:60}
  kis:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${KIS_APPKEY:}
    app-secret: ${KIS_APPSECRET:}
  issue:
    dart:
      api-key: ${DART_API_KEY:}
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
  backfill:
    enabled: ${BACKFILL_ENABLED:false}   # true일 때만 부팅 시 1회 2년 백필 실행
    limit: ${BACKFILL_LIMIT:300}
    years: ${BACKFILL_YEARS:2}
