spring:
  application:
    name: signal-collector
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/signallink}
    username: ${DB_USER:signallink}
    password: ${DB_PASSWORD:signallink}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

signallink:
  llm:
    daily-limit: ${LLM_DAILY_LIMIT:60}
  kis:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${KIS_APPKEY:}
    app-secret: ${KIS_APPSECRET:}
  issue:
    dart:
      api-key: ${DART_API_KEY:}
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
    disclosure:
      cron: ${DISCLOSURE_CRON:0 0/30 8-20 * * MON-FRI}   # 장중 30분 주기 (KST)
      days-back: ${DISCLOSURE_DAYS_BACK:1}               # 겹치게 폴링(멱등)
    news:
      cron: ${NEWS_CRON:0 15/30 8-20 * * MON-FRI}        # 장중 30분 주기 (공시와 15분 엇갈림)
  backfill:
    enabled: ${BACKFILL_ENABLED:false}   # true일 때만 부팅 시 1회 2년 백필 실행
    limit: ${BACKFILL_LIMIT:300}
    years: ${BACKFILL_YEARS:2}
  collect:
    daily-cron: ${COLLECT_CRON:0 30 16 * * MON-FRI}   # 평일 16:30 KST (장마감 후)
    limit: ${COLLECT_LIMIT:300}
    recent-days: ${COLLECT_RECENT_DAYS:5}
    index-codes: ${COLLECT_INDEX_CODES:0001,1001}     # 0001=KOSPI, 1001=KOSDAQ
  beta:
    weekly-cron: ${BETA_CRON:0 0 6 * * SAT}           # 토요일 06:00 KST
    limit: ${BETA_LIMIT:300}
  investor-flow:
    provisional-cron: ${INVESTOR_PROVISIONAL_CRON:0 0/30 9-15 * * MON-FRI}  # 장중 30분 (가집계 잠정)
    confirmed-cron: ${INVESTOR_CONFIRMED_CRON:0 40 16 * * MON-FRI}          # 시세 배치(16:30) 이후 확정
    confirmed-limit: ${INVESTOR_CONFIRMED_LIMIT:300}
