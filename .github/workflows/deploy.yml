# VPS 배포: main 머지 → GHCR 이미지 빌드 → VPS에서 compose pull & up
#
# ⚠️ 미처리(BACKLOG #5): VPS 계약 후 아래 설정 필요
#   1. repo Variables: DEPLOY_ENABLED=true
#   2. repo Secrets:  VPS_HOST / VPS_USER / VPS_SSH_KEY
#   3. VPS에 docker + compose 설치, ~/signallink/docker-compose.prod.yml 배치
#      (GHCR 이미지 참조 버전 — 로컬용 docker-compose.yml과 별도)
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images
        run: |
          for app in app-api app-collector; do
            IMG=ghcr.io/${{ github.repository }}/$app
            docker build -f $app/Dockerfile -t $IMG:latest -t $IMG:${{ github.sha }} .
            docker push --all-tags $IMG
          done

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/signallink
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
